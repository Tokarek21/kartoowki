<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAUCZYCIEL PRO 4.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #ffffff; --primary: #6366f1;
            --success: #22c55e; --danger: #ef4444; --text: #1e293b;
        }
        body {
            font-family: 'Poppins', sans-serif; background: var(--bg);
            color: var(--text); display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden;
        }
        #app {
            background: var(--card); padding: 30px; border-radius: 30px;
            width: 90%; max-width: 450px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative;
        }
        .logo { font-size: 4rem; margin: 0; }
        .hidden { display: none !important; }
        
        /* Przyciski */
        .btn {
            width: 100%; padding: 15px; margin: 10px 0; border: none;
            border-radius: 15px; font-weight: bold; cursor: pointer;
            transition: 0.2s; font-size: 1rem;
        }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(99,102,241,0.4); }
        
        /* Kartkówka */
        .paper {
            background: #f8fafc; border-left: 8px solid var(--primary);
            padding: 20px; margin: 20px 0; border-radius: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

        /* Pasek Energii (Kofeina) */
        .energy-bar { width: 100%; height: 100%; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        #energy-fill { width: 100%; height: 10px; background: #b45309; transition: 0.3s; }

        /* Przełącznik */
        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--danger); transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background: var(--success); }
        input:checked + .slider:before { transform: translateX(24px); }

        .grade { font-size: 7rem; font-weight: 900; color: var(--danger); transform: rotate(-15deg); margin: 20px 0; }
        .blinker { animation: blink 1s infinite alternate; font-size: 0.8rem; color: #64748b; margin-top: 15px; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="app">
    <div id="menu">
        <p class="logo">☕</p>
        <h1 style="margin: 0">POKÓJ NAUCZYCIELSKI</h1>
        <div class="energy-bar"><div id="energy-fill"></div></div>
        <p style="font-size: 0.8rem; color: #64748b; margin: 0">Poziom kofeiny</p>
        
        <div style="margin-top: 20px;">
            <button class="btn btn-main" onclick="startSingle()">SZYBKIE PYTANIE</button>
            <button class="btn btn-main" onclick="startMulti()">PEŁNA KARTKÓWKA</button>
        </div>
        <div class="blinker">UWAGA: DANE NIE ZAPISUJĄ SIĘ</div>
    </div>

    <div id="game" class="hidden">
        <h2 id="subject-label" style="color: var(--primary); margin-bottom: 5px;">PRZEDMIOT</h2>
        <div id="paper-content" class="paper"></div>
        
        <div id="single-ui" class="hidden" style="display: flex; gap: 10px;">
            <button class="btn" style="background: var(--danger); color: white;" onclick="judge(false)">ŹLE</button>
            <button class="btn" style="background: var(--success); color: white;" onclick="judge(true)">DOBRZE</button>
        </div>
        
        <button id="multi-ui" class="btn btn-main hidden" onclick="evaluateSheet()">WYSTAW OCENĘ</button>
        <button class="btn" style="background:none; color: #94a3b8;" onclick="location.reload()">ANULUJ</button>
    </div>

    <div id="summary" class="hidden">
        <h2 id="summary-title">OCENA:</h2>
        <div id="final-grade" class="grade">1</div>
        <p id="comment" style="font-style: italic;"></p>
        <button class="btn btn-main" onclick="location.reload()">KOLEJNA KLASA</button>
    </div>
</div>

<script>
    let energy = 100;
    let currentTaskCorrect = false;
    let multiAnswerKey = [];

    const db = {
        pl: [{q: "Rzaba", a: "Żaba", ok: false}, {q: "Szkoła", a: "Szkoła", ok: true}, {q: "Chmura", a: "Hmura", ok: false}],
        math: [{q: "5+5", res: "10", ok: true}, {q: "2+8", res: "11", ok: false}, {q: "3x3", res: "9", ok: true}],
        en: [{q: "Dog", a: "Pies", ok: true}, {q: "Apple", a: "Gruszka", ok: false}, {q: "Cat", a: "Kot", ok: true}]
    };

    function updateEnergy(val) {
        energy = Math.max(0, Math.min(100, energy + val));
        document.getElementById('energy-fill').style.width = energy + '%';
        if(energy <= 0) {
            alert("Zasypiasz nad biurkiem! Koniec pracy.");
            location.reload();
        }
    }

    function startSingle() {
        showView('game');
        document.getElementById('single-ui').classList.remove('hidden');
        document.getElementById('multi-ui').classList.add('hidden');
        nextSingle();
    }

    function nextSingle() {
        const subjects = ['pl', 'math', 'en'];
        const sub = subjects[Math.floor(Math.random()*subjects.length)];
        const task = db[sub][Math.floor(Math.random()*db[sub].length)];
        
        document.getElementById('subject-label').innerText = sub.toUpperCase();
        const content = document.getElementById('paper-content');
        
        if(sub === 'math') content.innerHTML = `<h1>${task.q} = ${task.res}</h1>`;
        else if(sub === 'en') content.innerHTML = `<h3>Tłumaczenie:</h3><h1>${task.q} = ${task.a}</h1>`;
        else content.innerHTML = `<h3>Pisownia:</h3><h1>${task.q}</h1>`;
        
        currentTaskCorrect = task.ok;
    }

    function judge(userChoice) {
        if(userChoice === currentTaskCorrect) {
            confetti({ particleCount: 40, spread: 50 });
            updateEnergy(5);
        } else {
            updateEnergy(-20);
            document.body.style.backgroundColor = "#450a0a";
            setTimeout(() => document.body.style.backgroundColor = "#0f172a", 200);
        }
        nextSingle();
    }

    function startMulti() {
        showView('game');
        document.getElementById('multi-ui').classList.remove('hidden');
        document.getElementById('single-ui').classList.add('hidden');
        
        const content = document.getElementById('paper-content');
        content.innerHTML = '';
        multiAnswerKey = [];
        
        for(let i=0; i<5; i++) {
            const sub = ['pl', 'math', 'en'][Math.floor(Math.random()*3)];
            const task = db[sub][Math.floor(Math.random()*db[sub].length)];
            multiAnswerKey.push(task.ok);
            
            let txt = sub === 'math' ? `${task.q}=${task.res}` : `${task.q}=${task.a || ''}`;
            if(sub === 'pl') txt = task.q;

            content.innerHTML += `
                <div class="row">
                    <span style="font-size:0.9rem">${txt}</span>
                    <label class="switch">
                        <input type="checkbox" id="check-${i}" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            `;
        }
    }

    function evaluateSheet() {
        let score = 0;
        multiAnswerKey.forEach((correct, i) => {
            if(document.getElementById(`check-${i}`).checked === correct) score++;
        });

        const grades = [1, 1, 2, 3, 5, 6];
        const comments = ["Katastrofa!", "Słabo...", "Może być.", "Dobrze!", "Super!", "Wzorowo!"];
        
        showView('summary');
        document.getElementById('final-grade').innerText = grades[score];
        document.getElementById('comment').innerText = comments[score];
        
        if(grades[score] >= 5) confetti({ particleCount: 150, spread: 100 });
    }

    function showView(viewId) {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game').classList.add('hidden');
        document.getElementById('summary').classList.add('hidden');
        document.getElementById(viewId).classList.remove('hidden');
    }

    // Inicjalizacja kofeiny
    updateEnergy(0);
</script>
</body>
</html>
