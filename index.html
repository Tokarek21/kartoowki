<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER NAUCZYCIEL 3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #ffffff;
            --primary: #6366f1;
            --success: #22c55e;
            --danger: #ef4444;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #app {
            background: var(--card-bg);
            color: var(--text-dark);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .logo { font-size: 3.5rem; display: block; margin-bottom: 10px; }
        .blinker { animation: neon 1.5s infinite alternate; color: #94a3b8; font-size: 0.8rem; margin-top: 20px; font-weight: bold; }
        @keyframes neon { from { opacity: 0.4; } to { opacity: 1; text-shadow: 0 0 10px #6366f1; } }

        .btn-main {
            background: var(--primary); color: white; border: none; padding: 16px;
            border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer;
            transition: 0.3s; margin-bottom: 10px;
        }
        .btn-main:hover { transform: scale(1.02); background: #4f46e5; }

        .paper {
            background: #f8fafc; border-left: 6px solid var(--primary);
            padding: 20px; margin: 20px 0; border-radius: 0 12px 12px 0;
            position: relative; overflow: hidden;
        }

        /* Styl Switche */
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 1.1rem; }
        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--success); }
        input:not(:checked) + .slider { background: var(--danger); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* Efekt Skreślenia */
        .scratch { position: absolute; color: var(--danger); font-size: 2rem; font-weight: bold; pointer-events: none; transform: rotate(-15deg); opacity: 0; transition: 0.2s; }

        .grade-stamp {
            font-size: 6rem; font-weight: 900; color: var(--danger);
            font-family: 'Courier New', monospace;
            animation: stamp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes stamp { 0% { transform: scale(4) rotate(0); opacity: 0; } 100% { transform: scale(1) rotate(-15deg); opacity: 1; } }

        .hidden { display: none; }
        .comment { font-style: italic; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="menu">
        <span class="logo">👨‍🏫</span>
        <h2 style="margin:0 0 20px 0">BIURO NAUCZYCIELA</h2>
        <button class="btn-main" onclick="startMode('single')">SZYBKI TEST</button>
        <button class="btn-main" onclick="startMode('multi')">CAŁA KARTKÓWKA</button>
        <div class="blinker">SYSTEM NIE ZAPISUJE DANYCH</div>
    </div>

    <div id="game-view" class="hidden">
        <h3 id="info-header" style="color:var(--primary)">Matematyka</h3>
        <div id="paper-area" class="paper"></div>
        <div id="single-controls" class="hidden" style="display:flex; gap:10px">
            <button onclick="checkSingle(false)" style="background:var(--danger); color:white; flex:1; padding:15px; border-radius:10px; border:none; font-weight:bold">ŹLE</button>
            <button onclick="checkSingle(true)" style="background:var(--success); color:white; flex:1; padding:15px; border-radius:10px; border:none; font-weight:bold">DOBRZE</button>
        </div>
        <button id="finish-btn" class="btn-main hidden" onclick="finishMulti()">WYSTAW OCENĘ</button>
    </div>

    <div id="summary" class="hidden">
        <div id="grade-box" class="grade-stamp">1</div>
        <p id="stats-text"></p>
        <p id="teacher-comment" class="comment"></p>
        <button class="btn-main" onclick="location.reload()">WRÓĆ DO MENU</button>
    </div>
</div>

<script>
    const imiona = ["Kuba", "Ania", "Kacper", "Maja", "Szymon", "Lena", "Oliwier", "Zuzia"];
    const slowka = [
        {q: "Rzaba", a: "Żaba", ok: false},
        {q: "Praca", a: "Praca", ok: true},
        {q: "Ktury", a: "Który", ok: false},
        {q: "Szkoła", a: "Szkoła", ok: true},
        {q: "Morze", a: "Może", ok: true} // dwuznaczne, ale przyjmijmy poprawne
    ];
    
    let currentMode = '';
    let tasks = [];

    function startMode(mode) {
        currentMode = mode;
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game-view').classList.remove('hidden');
        
        if(mode === 'single') {
            document.getElementById('single-controls').classList.remove('hidden');
            generateSingle();
        } else {
            document.getElementById('finish-btn').classList.remove('hidden');
            generateMulti();
        }
    }

    function generateSingle() {
        const area = document.getElementById('paper-area');
        const isMath = Math.random() > 0.5;
        document.getElementById('info-header').innerText = isMath ? "Matematyka" : "Język Polski";
        
        if(isMath) {
            const a = Math.floor(Math.random()*10)+1;
            const b = Math.floor(Math.random()*10)+1;
            const ok = Math.random() > 0.5;
            const res = ok ? a+b : a+b+1;
            area.innerHTML = `<h2>${a} + ${b} =</h2><h1 style="color:var(--primary)">${res}</h1>`;
            tasks = [ok];
        } else {
            const s = slowka[Math.floor(Math.random()*slowka.length)];
            area.innerHTML = `<h2>Jak zapisać:</h2><h1 style="color:var(--primary)">${s.q}</h1>`;
            tasks = [s.ok];
        }
    }

    function checkSingle(userChoice) {
        if(userChoice === tasks[0]) {
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 } });
            generateSingle();
        } else {
            alert("Błąd! Uważaj co oceniasz!");
            generateSingle();
        }
    }

    function generateMulti() {
        const name = imiona[Math.floor(Math.random()*imiona.length)];
        document.getElementById('info-header').innerText = `Kartkówka: ${name}`;
        const area = document.getElementById('paper-area');
        area.innerHTML = '';
        tasks = [];

        for(let i=0; i<5; i++) {
            const isMath = Math.random() > 0.5;
            let qText, isCorrect;
            
            if(isMath) {
                const a = Math.floor(Math.random()*10)+1;
                const b = Math.floor(Math.random()*10)+1;
                isCorrect = Math.random() > 0.5;
                qText = `${a}+${b}=${isCorrect ? a+b : a+b+1}`;
            } else {
                const s = slowka[Math.floor(Math.random()*slowka.length)];
                qText = `Słowo: ${s.q}`;
                isCorrect = s.ok;
            }

            tasks.push(isCorrect);
            area.innerHTML += `
                <div class="row">
                    <span>${qText}</span>
                    <label class="switch">
                        <input type="checkbox" id="t-${i}" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            `;
        }
    }

    function finishMulti() {
        let score = 0;
        tasks.forEach((ans, i) => {
            if(document.getElementById(`t-${i}`).checked === ans) score++;
        });

        const grades = [1, 1, 2, 3, 4, 6];
        const comments = [
            "Katastrofa... Zapraszam z rodzicami.",
            "Nic nie umiesz!",
            "Ledwo, ledwo. Postaraj się bardziej.",
            "Może być, ale stać Cię na więcej.",
            "Bardzo ładnie!",
            "Geniusz! Wzorowy nauczyciel!"
        ];

        document.getElementById('game-view').classList.add('hidden');
        document.getElementById('summary').classList.remove('hidden');
        
        const finalGrade = grades[score];
        document.getElementById('grade-box').innerText = finalGrade;
        document.getElementById('stats-text').innerText = `Poprawne oceny: ${score}/5`;
        document.getElementById('teacher-comment').innerText = comments[score];

        if(finalGrade === 6) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }
</script>
</body>
</html>
